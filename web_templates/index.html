<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ J.A.R.V.I.S - AI Yordamchi</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="header">
            <div class="header-left">
                <div class="logo-pulse"></div>
                <h1 class="logo">J.A.R.V.I.S</h1>
                <span class="subtitle">AI Yordamchi v1.0</span>
            </div>
            <div class="header-right">
                <span class="status-indicator" id="statusDot">●</span>
                <span class="status-text" id="statusText">Ulanmoqda...</span>
                <span class="time" id="clock"></span>
            </div>
        </header>

        <!-- CHAT AREA -->
        <main class="chat-area" id="chatArea">
            <!-- Messages will be inserted here -->
        </main>

        <!-- INPUT AREA -->
        <footer class="input-area">
            <div class="input-container">
                <button class="btn-mic" id="micBtn" title="Ovozli kiritish">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
                <input type="text" id="messageInput" placeholder="Buyruq yoki savol yozing..." autocomplete="off">
                <button class="btn-send" id="sendBtn" title="Yuborish">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <div class="input-hints">
                <span>💡 "yordam" — buyruqlar | "tozala" — chat tozalash</span>
            </div>
        </footer>
    </div>

    <!-- PARTICLES BACKGROUND -->
    <canvas id="particles"></canvas>

    <script src="/static/script.js"></script>
</body>
</html>
